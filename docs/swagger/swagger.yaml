          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Update permission
      tags:
      - Permission
  /api/v1/policies:
    delete:
      consumes:
      - application/json
      description: Remove one permission from one role.
