      security:
      - BearerAuth: []
      summary: Get permission detail
      tags:
      - Permission
    put:
      consumes:
      - application/json
      description: Update permission name, resource, action or description.
      parameters:
      - description: Permission ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update permission request
