basePath: /
definitions:
  handler.HealthData:
    properties:
      env:
        example: dev
        type: string
      name:
        example: yunshu-cmdb
        type: string
    type: object
  handler.MessageData:
    properties:
      message:
        example: success
        type: string
    type: object
  handler.PermissionPageData:
    properties:
      list:
        items:
          $ref: '#/definitions/service.PermissionItem'
        type: array
      page:
        example: 1
        type: integer
      page_size:
        example: 10
        type: integer
      total:
        example: 1
        type: integer
    type: object
  handler.RolePageData:
    properties:
      list:
        items:
          $ref: '#/definitions/service.RoleItem'
        type: array
      page:
        example: 1
        type: integer
      page_size:
        example: 10
        type: integer
      total:
        example: 1
        type: integer
    type: object
  handler.UserPageData:
    properties:
      list:
        items:
          $ref: '#/definitions/service.UserDetailResponse'
        type: array
      page:
        example: 1
        type: integer
      page_size:
        example: 10
        type: integer
      total:
        example: 1
        type: integer
    type: object
  response.Body:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.LoginCaptchaResponse:
    properties:
      captcha_code:
        type: string
      captcha_id:
        type: string
      expires_in:
        type: integer
    type: object
  service.LoginRequest:
    properties:
      captcha_code:
        type: string
      captcha_id:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - captcha_code
    - captcha_id
    - password
    - username
    type: object
  service.LoginResponse:
    properties:
      expires_at:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/service.UserDetailResponse'
    type: object
  service.PermissionCreateRequest:
    properties:
      action:
        maxLength: 32
        type: string
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 64
        type: string
      resource:
        maxLength: 191
        type: string
    required:
    - action
    - name
    - resource
    type: object
  service.PermissionItem:
    properties:
      action:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      resource:
        type: string
    type: object
  service.PermissionUpdateRequest:
    properties:
      action:
        maxLength: 32
        type: string
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 64
        type: string
      resource:
        maxLength: 191
        type: string
    type: object
  service.PolicyGrantRequest:
    properties:
      permission_id:
        type: integer
      role_id:
        type: integer
    required:
    - permission_id
    - role_id
    type: object
  service.PolicyItemResponse:
    properties:
      action:
        type: string
      permission_id:
        type: integer
      permission_name:
        type: string
      resource:
        type: string
      role_code:
        type: string
      role_id:
        type: integer
      role_name:
        type: string
    type: object
  service.RoleCreateRequest:
    properties:
      code:
        maxLength: 64
        type: string
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 64
        type: string
      status:
        type: integer
    required:
    - code
    - name
    type: object
  service.RoleItem:
    properties:
      code:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      status:
        type: integer
    type: object
  service.RoleUpdateRequest:
    properties:
      code:
        maxLength: 64
        type: string
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 64
        type: string
      status:
        type: integer
    type: object
  service.UserAssignRolesRequest:
    properties:
      role_ids:
        items:
          type: integer
        type: array
    type: object
  service.UserCreateRequest:
    properties:
      nickname:
        maxLength: 128
        type: string
      password:
        maxLength: 64
        minLength: 6
        type: string
      role_ids:
        items:
          type: integer
        type: array
      status:
        type: integer
      username:
        maxLength: 64
        minLength: 3
        type: string
    required:
    - nickname
    - password
    - username
    type: object
  service.UserDetailResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      nickname:
        type: string
      roles:
        items:
          $ref: '#/definitions/service.RoleItem'
        type: array
      status:
        type: integer
      updated_at:
        type: string
      username:
        type: string
    type: object
  service.UserUpdateRequest:
    properties:
      nickname:
        maxLength: 128
        type: string
      password:
        maxLength: 64
        minLength: 6
        type: string
      status:
        type: integer
    type: object
info:
  contact: {}
  description: |-
    YunShu CMDB is an operations CMDB console built with Gin, MySQL, Redis, Casbin, Cobra and slog.
    Call the captcha endpoint first, then login with username, password and the 6-digit captcha. Put `Bearer <token>` into the Authorization header afterwards.
  title: YunShu CMDB API
  version: "1.0"
paths:
  /api/v1/auth/captcha:
    post:
      description: Generate a 6-digit login captcha, store it in Redis and return
        it for the current login flow.
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/service.LoginCaptchaResponse'
              type: object
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Generate login captcha
      tags:
      - Auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login with username, password and a Redis-backed 6-digit captcha,
        then return a JWT access token.
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/service.LoginResponse'
              type: object
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Body'
      summary: Login
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      description: Logout the current user by invalidating the current token.
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/handler.MessageData'
              type: object
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      description: Get the profile of the current authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/response.Body'
            - properties:
                data:
                  $ref: '#/definitions/service.UserDetailResponse'
              type: object
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
  /api/v1/health:
